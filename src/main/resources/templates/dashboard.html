<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Дашборд</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments :: navbar('dashboard')}"></div>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h3 class="m-0">Дашборд</h3>
        <form sec:authorize="hasRole('ADMIN')" class="d-flex gap-2" th:action="@{/mpc/poll}" method="post">
            <input type="date" class="form-control form-control-sm" name="date" th:value="${today}">
            <button class="btn btn-primary btn-sm" type="submit">Запросить транзакции у МПЦ</button>
        </form>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="text-muted small">Транзакций сегодня</div>
                    <div class="fs-4 fw-semibold" th:text="${txCountToday}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="text-muted small">Сумма сегодня (KGS)</div>
                    <div class="fs-4 fw-semibold" th:text="${sumKgsToday}">0.00</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="text-muted small">Активных терминалов</div>
                    <div class="fs-4 fw-semibold" th:text="${activeTerminals}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="text-muted small">Проводок сегодня</div>
                    <div class="fs-4 fw-semibold" th:text="${postingsToday}">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    Последние 10 транзакций
                </div>
                <div class="table-responsive">
                    <table class="table table-sm table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Время</th>
                            <th>Терминал</th>
                            <th>Валюта</th>
                            <th class="text-end">Сумма</th>
                            <th>Статус</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="tx : ${lastTx}">
                            <td th:text="${tx.operDateTime}">2026-01-01T10:00</td>
                            <td th:text="${tx.terminal.deviceCode}">POS-001</td>
                            <td th:text="${tx.currency}">KGS</td>
                            <td class="text-end" th:text="${tx.amount}">0.00</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${tx.status.name()=='NEW' ? ' text-bg-warning' : (tx.status.name()=='PROCESSED' ? ' text-bg-success' : ' text-bg-danger')}"
                                      th:text="${tx.status}">
                                    NEW
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(lastTx)}">
                            <td colspan="5" class="text-center text-muted py-4">Нет данных</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    Статус МПЦ
                </div>
                <div class="card-body">
                    <div th:if="${lastRun == null}" class="text-muted">Ещё не было опросов.</div>
                    <div th:if="${lastRun != null}">
                        <div class="mb-2"><span class="text-muted">Последний опрос:</span> <span th:text="${lastRun.startedAt}">—</span></div>
                        <div class="mb-2"><span class="text-muted">Статус:</span>
                            <span class="badge"
                                  th:classappend="${lastRun.status.name()=='SUCCESS' ? ' text-bg-success' : (lastRun.status.name()=='FAILED' ? ' text-bg-danger' : ' text-bg-warning')}"
                                  th:text="${lastRun.status}">SUCCESS</span>
                        </div>
                        <div class="mb-2"><span class="text-muted">Получено записей:</span> <span th:text="${lastRun.receivedCount}">0</span></div>
                        <div th:if="${lastRun.errorMessage != null}" class="alert alert-danger py-2 mb-0">
                            <div class="small fw-semibold">Ошибка</div>
                            <div class="small" th:text="${lastRun.errorMessage}">—</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
