<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Проводки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments :: navbar('postings')}"></div>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h3 class="m-0">Проводки</h3>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/postings}">Сбросить фильтры</a>
    </div>

    <form class="card shadow-sm mb-3" method="get" th:action="@{/postings}">
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small">Дата от</label>
                    <input type="date" class="form-control form-control-sm" name="from" th:value="${from}">
                </div>
                <div class="col-md-3">
                    <label class="form-label small">Дата до</label>
                    <input type="date" class="form-control form-control-sm" name="to" th:value="${to}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Валюта</label>
                    <select class="form-select form-select-sm" name="currency">
                        <option value="">Все</option>
                        <option th:each="c : ${currencies}" th:value="${c}" th:selected="${currency==c}" th:text="${c}">KGS</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Статус</label>
                    <select class="form-select form-select-sm" name="status">
                        <option value="">Все</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:selected="${status==s}" th:text="${s}">COMPLETED</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary btn-sm w-100" type="submit">Показать</button>
                </div>
            </div>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID проводки</th>
                    <th>ID транзакции</th>
                    <th>Терминал</th>
                    <th>Счёт банка</th>
                    <th>Валюта</th>
                    <th class="text-end">Сумма</th>
                    <th>Статус</th>
                    <th>Дата создания</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${postingPage.content}">
                    <td th:text="${p.id}">1</td>
                    <td th:text="${p.transaction.id}">1</td>
                    <td th:text="${p.transaction.terminal.deviceCode}">POS-001</td>
                    <td th:text="${p.bankAccount.accountNumber}">—</td>
                    <td th:text="${p.currency}">KGS</td>
                    <td class="text-end" th:text="${p.amount}">0.00</td>
                    <td>
                        <span class="badge"
                              th:classappend="${p.postingStatus.name()=='COMPLETED' ? ' text-bg-success' : ' text-bg-danger'}"
                              th:text="${p.postingStatus}">COMPLETED</span>
                    </td>
                    <td th:text="${p.createdAt}">2026-01-01T10:00</td>
                </tr>
                <tr th:if="${#lists.isEmpty(postingPage.content)}">
                    <td colspan="8" class="text-center text-muted py-4">Нет данных</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="card-body border-top d-flex align-items-center justify-content-between">
            <div class="text-muted small">
                Страница <span th:text="${postingPage.number+1}">1</span> из <span th:text="${postingPage.totalPages==0?1:postingPage.totalPages}">1</span>
                (всего <span th:text="${postingPage.totalElements}">0</span>)
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${postingPage.first} ? ' disabled' : ''">
                        <a class="page-link"
                           th:href="@{/postings(page=${postingPage.number-1},from=${from},to=${to},currency=${currency},status=${status})}">Назад</a>
                    </li>
                    <li class="page-item" th:classappend="${postingPage.last} ? ' disabled' : ''">
                        <a class="page-link"
                           th:href="@{/postings(page=${postingPage.number+1},from=${from},to=${to},currency=${currency},status=${status})}">Вперёд</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
