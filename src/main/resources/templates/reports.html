<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Отчёты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments :: navbar('reports')}"></div>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h3 class="m-0">Отчёты</h3>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="d-flex flex-wrap gap-2 align-items-end">
                <a class="btn btn-outline-primary btn-sm" th:href="@{/reports(preset='today')}">Сегодня</a>
                <a class="btn btn-outline-primary btn-sm" th:href="@{/reports(preset='week')}">Неделя</a>
                <a class="btn btn-outline-primary btn-sm" th:href="@{/reports(preset='month')}">Месяц</a>
                <form class="d-flex gap-2 ms-auto" method="get" th:action="@{/reports}">
                    <input type="hidden" name="preset" value="custom">
                    <div>
                        <label class="form-label small mb-1">От</label>
                        <input type="date" class="form-control form-control-sm" name="from" th:value="${from}">
                    </div>
                    <div>
                        <label class="form-label small mb-1">До</label>
                        <input type="date" class="form-control form-control-sm" name="to" th:value="${to}">
                    </div>
                    <div class="d-flex align-items-end">
                        <button class="btn btn-primary btn-sm" type="submit">Сформировать</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header bg-white">Сводная таблица по валютам</div>
                <div class="table-responsive">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Валюта</th>
                            <th class="text-end">Сумма</th>
                            <th class="text-end">В KGS</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="r : ${report.byCurrency}">
                            <td th:text="${r.currency}">KGS</td>
                            <td class="text-end" th:text="${r.amount}">0.00</td>
                            <td class="text-end" th:text="${r.amountInKgs}">0.00</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(report.byCurrency)}">
                            <td colspan="3" class="text-center text-muted py-4">Нет данных</td>
                        </tr>
                        </tbody>
                        <tfoot>
                        <tr class="table-light">
                            <th colspan="2">Итого (KGS)</th>
                            <th class="text-end" th:text="${report.totalInKgs}">0.00</th>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white">Детализация по терминалам</div>
                <div class="table-responsive">
                    <table class="table table-sm table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Терминал</th>
                            <th>Валюта</th>
                            <th class="text-end">Кол-во</th>
                            <th class="text-end">Сумма</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="r : ${report.byTerminal}">
                            <td th:text="${r.deviceCode}">POS-001</td>
                            <td th:text="${r.currency}">KGS</td>
                            <td class="text-end" th:text="${r.count}">0</td>
                            <td class="text-end" th:text="${r.amount}">0.00</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(report.byTerminal)}">
                            <td colspan="4" class="text-center text-muted py-4">Нет данных</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
