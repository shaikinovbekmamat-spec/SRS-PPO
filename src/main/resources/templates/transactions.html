<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Транзакции</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments :: navbar('transactions')}"></div>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h3 class="m-0">Транзакции</h3>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/transactions}">Сбросить фильтры</a>
    </div>

    <form class="card shadow-sm mb-3" method="get" th:action="@{/transactions}">
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-md-2">
                    <label class="form-label small">Дата от</label>
                    <input type="date" class="form-control form-control-sm" name="from" th:value="${from}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Дата до</label>
                    <input type="date" class="form-control form-control-sm" name="to" th:value="${to}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Код терминала</label>
                    <input type="text" class="form-control form-control-sm" name="deviceCode" placeholder="POS-001" th:value="${deviceCode}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Валюта</label>
                    <select class="form-select form-select-sm" name="currency">
                        <option value="">Все</option>
                        <option th:each="c : ${currencies}" th:value="${c}" th:selected="${currency==c}" th:text="${c}">KGS</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Статус</label>
                    <select class="form-select form-select-sm" name="status">
                        <option value="">Все</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:selected="${status==s}" th:text="${s}">NEW</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button class="btn btn-primary btn-sm w-100" type="submit">Показать</button>
                </div>
            </div>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Терминал</th>
                    <th>Дата/Время</th>
                    <th>Валюта</th>
                    <th class="text-end">Сумма</th>
                    <th>Карта</th>
                    <th>Статус</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="tx : ${txPage.content}">
                    <td th:text="${tx.id}">1</td>
                    <td th:text="${tx.terminal.deviceCode}">POS-001</td>
                    <td th:text="${tx.operDateTime}">2026-01-01T10:00</td>
                    <td th:text="${tx.currency}">KGS</td>
                    <td class="text-end" th:text="${tx.amount}">0.00</td>
                    <td th:text="${tx.cardNumberMasked}">******0000</td>
                    <td>
                        <span class="badge"
                              th:classappend="${tx.status.name()=='NEW' ? ' text-bg-warning' : (tx.status.name()=='PROCESSED' ? ' text-bg-success' : ' text-bg-danger')}"
                              th:text="${tx.status}">NEW</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(txPage.content)}">
                    <td colspan="7" class="text-center text-muted py-4">Нет данных</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="card-body border-top d-flex align-items-center justify-content-between">
            <div class="text-muted small">
                Страница <span th:text="${txPage.number+1}">1</span> из <span th:text="${txPage.totalPages==0?1:txPage.totalPages}">1</span>
                (всего <span th:text="${txPage.totalElements}">0</span>)
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${txPage.first} ? ' disabled' : ''">
                        <a class="page-link"
                           th:href="@{/transactions(page=${txPage.number-1},from=${from},to=${to},deviceCode=${deviceCode},currency=${currency},status=${status})}">Назад</a>
                    </li>
                    <li class="page-item" th:classappend="${txPage.last} ? ' disabled' : ''">
                        <a class="page-link"
                           th:href="@{/transactions(page=${txPage.number+1},from=${from},to=${to},deviceCode=${deviceCode},currency=${currency},status=${status})}">Вперёд</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
