<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Терминалы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments :: navbar('terminals')}"></div>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h3 class="m-0">Терминалы</h3>
        <div sec:authorize="hasRole('ADMIN')">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addTerminalModal">Добавить терминал</button>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>DeviceCode</th>
                    <th>Местоположение</th>
                    <th>Статус</th>
                    <th>Последняя транзакция</th>
                    <th sec:authorize="hasRole('ADMIN')">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${terminals}">
                    <td th:text="${t.deviceCode}">POS-001</td>
                    <td th:text="${t.location}">—</td>
                    <td>
                        <span class="badge"
                              th:classappend="${t.status.name()=='ACTIVE' ? ' text-bg-success' : ' text-bg-secondary'}"
                              th:text="${t.status}">ACTIVE</span>
                    </td>
                    <td th:text="${lastTxByTerminalId[t.id] != null ? lastTxByTerminalId[t.id].operDateTime : '—'}">—</td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <div class="btn-group btn-group-sm">
                            <form th:action="@{/terminals/update-status}" method="post" class="d-inline">
                                <input type="hidden" name="id" th:value="${t.id}">
                                <input type="hidden" name="status" th:value="${t.status.name() == 'ACTIVE' ? 'INACTIVE' : 'ACTIVE'}">
                                <button type="submit" class="btn btn-outline-warning" 
                                        th:text="${t.status.name() == 'ACTIVE' ? 'Деактивировать' : 'Активировать'}">Status</button>
                            </form>
                            <form th:action="@{/terminals/delete/{id}(id=${t.id})}" method="post" class="d-inline" 
                                  onsubmit="return confirm('Вы уверены?');">
                                <button type="submit" class="btn btn-outline-danger">Удалить</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(terminals)}">
                    <td colspan="5" class="text-center text-muted py-4">Нет данных</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal for adding terminal -->
    <div sec:authorize="hasRole('ADMIN')" class="modal fade" id="addTerminalModal" tabindex="-1">
        <div class="modal-dialog">
            <form th:action="@{/terminals/add}" method="post">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Новый терминал</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Код устройства (Device Code)</label>
                            <input type="text" name="deviceCode" class="form-label form-control" required placeholder="TERM-XXXX">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
