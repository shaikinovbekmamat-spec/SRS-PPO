<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Курсы валют</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments :: navbar('exchange-rates')}"></div>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <h3 class="m-0">Курсы валют</h3>
            <div class="text-muted small">Базовая валюта KGS имеет фиксированный курс 1.000000</div>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">Успешно</div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">Ошибка</div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">Добавить или обновить курс</div>
                <div class="card-body">
                    <form th:action="@{/exchange-rates}" method="post" class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Валюта</label>
                            <select name="currency" class="form-select" required>
                                <option value="" selected disabled>Выберите валюту</option>
                                <option th:each="currency : ${currencies}" th:value="${currency}" th:text="${currency}">USD</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Дата курса</label>
                            <input type="date" name="rateDate" class="form-control" th:value="${today}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Курс к KGS</label>
                            <input type="number" name="rate" class="form-control" step="0.000001" min="0.000001" placeholder="Например, 89.500000" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary w-100">Сохранить курс</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">Список курсов</div>
                <div class="table-responsive">
                    <table class="table table-sm table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Валюта</th>
                            <th>Дата</th>
                            <th>Курс к KGS</th>
                            <th>Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="rate : ${rates}">
                            <td th:text="${rate.fromCurrency}">USD</td>
                            <td th:text="${rate.rateDate}">2026-04-02</td>
                            <td th:text="${#numbers.formatDecimal(rate.rate, 1, 'COMMA', 6, 'POINT')}">89.500000</td>
                            <td>
                                <form th:action="@{/exchange-rates/delete/{id}(id=${rate.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Удалить курс?');">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">Удалить</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(rates)}">
                            <td colspan="4" class="text-center text-muted py-4">Курсы пока не добавлены</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
