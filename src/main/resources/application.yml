server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: pos-transactions
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pos}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:5555}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

logging:
  level:
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:warn}
    com.bank.pos: ${APP_LOG_LEVEL:info}

app:
  mpc:
    base-url: ${MPC_BASE_URL:http://localhost:8080}
    bank-code: ${MPC_BANK_CODE:HALYK}
    bearer-token: ${MPC_BEARER_TOKEN:}
    polling:
      enabled: ${MPC_POLLING_ENABLED:true}
      cron: ${MPC_POLLING_CRON:0 */15 * * * *}
      page-size: ${MPC_POLLING_PAGE_SIZE:100}

